// ============================================================
//  CẤU HÌNH KẾT NỐI MONGODB ATLAS DATA API
//  Điền thông tin của bạn vào đây để kết nối với ESP8266 thật.
//  Nếu để nguyên (hoặc để trống), dashboard sẽ chạy chế độ DEMO.
// ============================================================

const MONGO_CONFIG = {
  // Bật/tắt kết nối MongoDB thật (true = dùng thật, false = chế độ Demo)
  ENABLED: false,

  // App ID từ MongoDB Atlas App Services (Realm)
  // Ví dụ: "myapp-abcde"
  APP_ID: "YOUR_APP_ID",

  // API Key từ MongoDB Atlas App Services → Authentication → API Keys
  API_KEY: "YOUR_API_KEY",

  // Tên database và collection trên MongoDB Atlas
  DATABASE: "water_station",
  COLLECTION: "sensor_data",

  // Cluster name (thường là "Cluster0")
  DATA_SOURCE: "Cluster0",

  // Tên field trong document MongoDB (theo cấu trúc ESP8266 gửi lên)
  FIELDS: {
    timestamp: "timestamp",        // Thời gian đo
    water_level: "water_level",    // Mực nước (0.0 - 100.0 %)
    pump_in: "pump_in",            // Bơm vào: true/false
    pump_out: "pump_out",          // Bơm ra: true/false
    tank_id: "tank_id",            // ID bồn nước (nếu có nhiều bồn)
  },

  // Lọc theo tank_id (để "" nếu chỉ có 1 bồn)
  TANK_ID: "tank_01",

  // Số điểm dữ liệu lịch sử tải về lúc đầu
  INITIAL_FETCH_LIMIT: 30,

  // Khoảng thời gian polling (ms)
  POLL_INTERVAL_MS: 5000,
};

// ============================================================
//  CẤU HÌNH HIỂN THỊ
// ============================================================
const DISPLAY_CONFIG = {
  // Ngưỡng cảnh báo mực nước (%)
  LEVEL_CRITICAL_HIGH: 90,   // Gần tràn → ĐỎ
  LEVEL_WARNING_HIGH: 75,    // Cao → VÀNG
  LEVEL_WARNING_LOW: 25,     // Thấp → VÀNG
  LEVEL_CRITICAL_LOW: 10,    // Gần cạn → ĐỎ

  // Tên trạm (hiển thị trên dashboard)
  STATION_NAME: "Trạm Quản Lý Nước Thải",
  TANK_NAME: "Bồn Chứa Chính",

  // Dung tích bồn thực tế (lít) - chỉ hiển thị, không ảnh hưởng tính toán
  TANK_CAPACITY_LITERS: 5000,
};
